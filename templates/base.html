<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}N2 日文學習系統{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">🎌 N2 日文學習</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link {% if request.endpoint=='index' %}active{% endif %}" href="/"><i class="bi bi-house-door"></i> 首頁</a></li>
          <li class="nav-item"><a class="nav-link {% if request.endpoint=='vocab' %}active{% endif %}" href="/vocab"><i class="bi bi-book"></i> 詞彙學習</a></li>
          <li class="nav-item"><a class="nav-link {% if 'quiz' in request.endpoint %}active{% endif %}" href="/quiz"><i class="bi bi-pencil-square"></i> 題庫練習</a></li>
          <li class="nav-item"><a class="nav-link {% if request.endpoint=='stats' %}active{% endif %}" href="/stats"><i class="bi bi-bar-chart-line"></i> 學習進度</a></li>
          {% if session.user_name %}
          <li class="nav-item d-flex align-items-center ms-2">
            <span class="text-white me-2"><i class="bi bi-person-circle"></i> {{ session.user_name }}</span>
            <a class="btn btn-outline-light btn-sm" href="/switch">切換</a>
          </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
